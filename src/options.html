<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Web-to-AI Context Chat - 设置</title>
    <link rel="stylesheet" href="./options.css" />
  </head>
  <body>
    <div class="container">
      <h1>Web-to-AI Context Chat</h1>
      <p class="sub">添加 OpenAI 兼容模型，只需填写接口 URL、模型参数和 API Key。模型参数同时作为界面中的模型名称。</p>

      <div class="form">
        <div class="profile-row">
          <strong id="createTitle" class="create-title" hidden>新增模型</strong>
          <label class="profile-select">
            <span>模型配置</span>
            <select id="profile"></select>
          </label>
          <button id="setDefault" type="button" class="default-button">设为默认</button>
          <button id="addProfile" type="button" class="secondary">新增</button>
          <button id="cancelAdd" type="button" class="secondary" hidden>取消新增</button>
          <button id="deleteProfile" type="button" class="danger">删除</button>
        </div>
        <label>
          <span>接口 URL</span>
          <input id="baseUrl" type="text" placeholder="https://api.deepseek.com 或 https://你的域名/v1" />
        </label>

        <label>
          <span>模型参数（同时作为模型名称）</span>
          <input id="model" type="text" placeholder="deepseek-v4-flash" />
        </label>

        <label>
          <span>API Key</span>
          <input id="apiKey" type="password" placeholder="sk-..." autocomplete="off" />
        </label>

        <label class="check-label">
          <input id="supportsImages" type="checkbox" />
          <span>支持图片输入</span>
        </label>

        <div class="row">
          <button id="save">保存</button>
          <button id="test" class="secondary">测试连接</button>
          <div id="status" class="status" aria-live="polite"></div>
        </div>
      </div>

      <div class="tips">
        <div class="tip-title">使用提示</div>
        <ul>
          <li>Chat 顶部可以随时切换已保存的模型配置。</li>
          <li>截图上下文只能发送给勾选了“支持图片输入”的模型。</li>
          <li>右键菜单仅用于打开 Chat；表格和截图由浮层内主动加入。</li>
        </ul>
      </div>
    </div>

    <script type="module" src="./options.js"></script>
  </body>
</html>
