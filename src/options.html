<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Web-to-AI Context Chat - 设置</title>
    <link rel="stylesheet" href="./options.css" />
  </head>
  <body>
    <div class="container">
      <h1>Web-to-AI Context Chat</h1>
      <p class="sub">配置多个 OpenAI 兼容模型。每个模型拥有独立的 Base URL、API Key 和图片能力；API Key 仅保存在当前浏览器。</p>

      <div class="form">
        <div class="profile-row">
          <label class="profile-select">
            <span>模型配置</span>
            <select id="profile"></select>
          </label>
          <button id="addProfile" type="button" class="secondary">新增</button>
          <button id="deleteProfile" type="button" class="danger">删除</button>
        </div>
        <label>
          <span>供应商预设</span>
          <select id="provider">
            <option value="deepseek">DeepSeek</option>
            <option value="openai">OpenAI 兼容</option>
            <option value="custom">自定义</option>
          </select>
        </label>

        <label>
          <span>Base URL</span>
          <input id="baseUrl" type="text" placeholder="https://api.deepseek.com 或 https://你的域名/v1" />
        </label>

        <label>
          <span>配置名称</span>
          <input id="name" type="text" placeholder="例如：GPT-4o Vision" />
        </label>

        <label>
          <span>Model 参数</span>
          <input id="model" type="text" placeholder="deepseek-v4-flash" />
        </label>

        <label class="check-label">
          <input id="supportsImages" type="checkbox" />
          <span>支持图片输入（仅在模型真实支持视觉能力时开启）</span>
        </label>

        <label>
          <span>API Key</span>
          <input id="apiKey" type="password" placeholder="sk-..." autocomplete="off" />
        </label>

        <label>
          <span>模型上下文窗口（tokens）</span>
          <input id="contextWindow" type="number" min="8192" step="1024" />
        </label>

        <label>
          <span>预留最大输出（tokens）</span>
          <input id="maxOutputTokens" type="number" min="256" step="256" />
        </label>

        <div class="row">
          <button id="save">保存</button>
          <button id="test" class="secondary">测试连接</button>
          <div id="status" class="status" aria-live="polite"></div>
        </div>
      </div>

      <div class="tips">
        <div class="tip-title">使用提示</div>
        <ul>
          <li>Chat 顶部可以随时切换已保存的模型配置。</li>
          <li>截图上下文只能发送给勾选了“支持图片输入”的模型。</li>
          <li>右键菜单仅用于打开 Chat；表格和截图由浮层内主动加入。</li>
        </ul>
      </div>
    </div>

    <script type="module" src="./options.js"></script>
  </body>
</html>
